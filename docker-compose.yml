version: '3.8'

services:
  db:
    image: mariadb:lts
    container_name: arrera_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql:Z

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: arrera_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db

  web-site:
    build: ./site-web  
    container_name: arrera_web_site
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./site-web:/var/www/html:Z
    depends_on:
      - db

  # 4. Deuxième Conteneur Web (Librairie)
  web-librairy:
    build: ./librairy-website 
    container_name: arrera_web_librairy
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./librairy-website:/var/www/html:Z
    depends_on:
      - db

volumes:
  db_data:
  site-web:
  librairy-website: